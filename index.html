<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบวิเคราะห์ข้อเสนอ สปสช.</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap");

    :root {
      --bg: #08111f;
      --bg-soft: #0f172a;
      --card: #172338;
      --card-2: #111c2f;
      --border: #2b3a55;
      --text: #e5eefc;
      --muted: #94a3b8;
      --sky: #0ea5e9;
      --indigo: #6366f1;
      --emerald: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #8b5cf6;
      --teal: #14b8a6;
      --slate: #64748b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Sarabun", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(14,165,233,0.15), transparent 34%),
        radial-gradient(circle at top right, rgba(99,102,241,0.16), transparent 28%),
        linear-gradient(180deg, #091221 0%, #06101d 100%);
      color: var(--text);
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 20px 32px;
    }

    .hero {
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(90deg, rgba(14,165,233,0.12), rgba(8,17,31,0.85), rgba(99,102,241,0.14));
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .hero-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: rgba(14, 165, 233, 0.14);
      border: 1px solid rgba(14, 165, 233, 0.35);
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-row {
      display: flex;
      gap: 12px;
